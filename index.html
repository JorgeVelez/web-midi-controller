<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web MIDI Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Web MIDI Controller</h1>
      <div id="midi-status" class="status disconnected">MIDI not connected</div>
    </header>

    <section class="device-panel">
      <div class="device-group">
        <label for="midi-in-select">MIDI Input</label>
        <select id="midi-in-select" disabled>
          <option value="">-- No devices --</option>
        </select>
      </div>
      <div class="device-group">
        <label for="midi-out-select">MIDI Output</label>
        <select id="midi-out-select" disabled>
          <option value="">-- No devices --</option>
        </select>
      </div>
      <div class="device-group thru-group">
        <label class="thru-label" for="thru-toggle">MIDI Thru</label>
        <input type="checkbox" id="thru-toggle" checked>
      </div>
    </section>

    <section class="controls-panel">
      <div class="ctrl-group">
        <h2>Sound</h2>
        <div class="sound-inner">
          <div class="sound-presets">
            <span class="sound-presets-label">Voices</span>
            <button class="preset-btn active" data-preset="0">1</button>
            <button class="preset-btn" data-preset="1">2</button>
            <button class="preset-btn" data-preset="2">3</button>
            <button class="preset-btn" data-preset="3">4</button>
            <button class="preset-btn" data-preset="4">5</button>
            <button class="preset-btn" data-preset="5">6</button>
            <button class="preset-btn preset-btn--all" data-preset="all">all</button>
          </div>
          <div class="sound-right">
            <div class="pc-controls">
              <span class="pc-title">Program</span>
              <button id="pc-prev-btn" disabled>&#9664;</button>
              <div class="pc-display">
                <span id="pc-label">1</span>
                <span id="pc-name">Virtual Analog VCF</span>
              </div>
              <button id="pc-next-btn" disabled>&#9654;</button>
            </div>
            <div class="knob-grid" id="ctrl-sound"></div>
            <div class="rhythm-assign">
              <span class="rhythm-assign-label">Rhythm</span>
              <button class="rhythm-btn active" data-rhythm="0">1</button>
              <button class="rhythm-btn" data-rhythm="1">2</button>
              <button class="rhythm-btn" data-rhythm="2">3</button>
              <button class="rhythm-btn" data-rhythm="3">4</button>
              <button class="rhythm-btn" data-rhythm="4">5</button>
              <button class="rhythm-btn" data-rhythm="5">6</button>
            </div>
          </div>
        </div>
      </div>
      <div class="ctrl-group">
        <h2>Rhythm</h2>
        <div class="rhythm-select">
          <span class="rhythm-select-label">Engine</span>
          <button class="rhythm-sel-btn active" data-engine="1">1</button>
          <button class="rhythm-sel-btn" data-engine="2">2</button>
          <button class="rhythm-sel-btn" data-engine="3">3</button>
          <button class="rhythm-sel-btn" data-engine="4">4</button>
          <button class="rhythm-sel-btn" data-engine="5">5</button>
          <button class="rhythm-sel-btn" data-engine="6">6</button>
        </div>
        <button id="rhythm-play-btn" class="play-btn">&#9654;</button>
        <div class="ctrl-rhythm-sets">
          <div class="ctrl-rhythm-set">
            <span class="ctrl-set-num">1</span>
            <div class="knob-grid" id="ctrl-rhythm-1"></div>
          </div>
          <div class="ctrl-rhythm-set">
            <span class="ctrl-set-num">2</span>
            <div class="knob-grid" id="ctrl-rhythm-2"></div>
          </div>
        </div>
      </div>
      <div class="ctrl-group">
        <h2>Pitch</h2>
        <div class="knob-grid" id="ctrl-pitch"></div>
      </div>
      <div class="ctrl-group">
        <h2>Global</h2>
        <div class="knob-grid" id="ctrl-global"></div>
      </div>
    </section>

    <section class="piano-panel">
      <div class="piano-header">
        <div class="octave-controls">
          <h2>Piano</h2>
          <button id="oct-down-btn">&#9664; Oct</button>
          <span id="piano-range-label" class="piano-range">C3 – B5</span>
          <button id="oct-up-btn">Oct &#9654;</button>
        </div>
      </div>
      <div class="piano-wrap">
        <div id="piano" class="piano"></div>
      </div>
    </section>

    <section class="monitor-panel">
      <div class="monitor-header">
        <h2>MIDI Monitor</h2>
        <button id="clear-btn">Clear</button>
      </div>
      <div id="midi-log" class="midi-log">
        <p class="placeholder">Waiting for MIDI messages...</p>
      </div>
    </section>

    <section class="config-panel">
      <h2>Configuration</h2>
      <button id="reset-state-btn">Reset Saved</button>
    </section>

    <section class="send-panel">
      <div class="send-controls">
        <div class="send-field">
          <label for="send-type">Type</label>
          <select id="send-type">
            <option value="noteon">Note On</option>
            <option value="noteoff">Note Off</option>
            <option value="cc">CC</option>
            <option value="pc">Prog Chg</option>
            <option value="sysex">SysEx</option>
          </select>
        </div>
        <div class="send-field">
          <label for="send-channel">Ch</label>
          <input id="send-channel" type="number" min="1" max="16" value="1">
        </div>
        <div class="send-field" id="field-byte1">
          <label for="send-byte1">Note / CC#</label>
          <input id="send-byte1" type="number" min="0" max="127" value="60">
        </div>
        <div class="send-field" id="field-byte2">
          <label for="send-byte2">Val / Vel</label>
          <input id="send-byte2" type="number" min="0" max="127" value="100">
        </div>
        <div class="send-field" id="field-sysex" style="display:none">
          <label for="send-sysex">Hex</label>
          <input id="send-sysex" type="text" placeholder="F0 41 10 00 F7" spellcheck="false">
        </div>
        <button id="send-btn" disabled>Send</button>
      </div>
    </section>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
